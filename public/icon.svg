<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" />
  <!-- Invoice lines -->
  <rect x="156" y="160" width="200" height="16" rx="8" fill="white" opacity="0.3"/>
  <rect x="156" y="192" width="140" height="12" rx="6" fill="white" opacity="0.2"/>
  <rect x="156" y="216" width="160" height="12" rx="6" fill="white" opacity="0.2"/>
  <!-- Bold B letter -->
  <text x="256" y="320" 
    font-family="Arial Black, Helvetica, sans-serif" 
    font-size="192" 
    font-weight="900" 
    text-anchor="middle" 
    fill="white"
    letter-spacing="-4">B</text>
  <!-- Bottom accent line -->
  <rect x="156" y="360" width="200" height="8" rx="4" fill="white" opacity="0.4"/>
</svg>
